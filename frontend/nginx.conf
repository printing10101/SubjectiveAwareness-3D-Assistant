# ============================================================
# Nginx configuration for the Vue 3 SPA + FastAPI reverse proxy
# ============================================================

# Upstream block: resolve once and reuse the backend connection pool.
upstream backend_api {
    server api:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Project root served by Nginx.
    root /usr/share/nginx/html;
    index index.html;

    # Reasonable defaults.
    charset utf-8;
    server_tokens off;
    client_max_body_size 20m;

    # --------------------------------------------------------
    # Gzip compression
    # --------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # --------------------------------------------------------
    # API reverse proxy
    # All /api/* requests are forwarded to the FastAPI service
    # running on the "api" container within the Compose network.
    # --------------------------------------------------------
    location /api/ {
        proxy_pass http://backend_api;

        # Proxy headers
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # Timeouts / buffering
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffering       on;
        proxy_buffers         16 16k;
        proxy_busy_buffers_size 32k;

        # Do not let downstream caches store API responses by default.
        add_header Cache-Control "no-store" always;
    }

    # --------------------------------------------------------
    # Static assets with long-lived cache
    # Vite emits fingerprinted filenames (e.g. /assets/index-*.js),
    # so they can be cached immutably for one year.
    # --------------------------------------------------------
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|ico|png|jpg|jpeg|gif|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # --------------------------------------------------------
    # SPA fallback
    # Any unmatched route is served by index.html so the Vue
    # Router can take over on the client side (no 404 on refresh).
    # --------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;

        # index.html itself should always be revalidated.
        add_header Cache-Control "no-cache" always;
    }

    # Health check endpoint (optional, useful for orchestrators).
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Hide hidden files (.git, .env, ...).
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Compression-friendly logging.
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
