model:
  model_name_or_path: "unsloth/Llama-3.2-1B-Instruct-bnb-4bit"
  max_seq_length: 2048
  load_in_4bit: true

lora:
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.1
  bias: "none"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  num_train_epochs: 3
  warmup_ratio: 0.1
  logging_steps: 10
  save_steps: 50
  save_total_limit: 3
  fp16: true
  bf16: false
  max_grad_norm: 1.0
  optim: "adamw_8bit"
  seed: 42
  report_to: "none"

data:
  train_data_path: "c:/Users/Lenovo/Desktop/微信程序开发/data/training/train.jsonl"
  eval_data_path: "c:/Users/Lenovo/Desktop/微信程序开发/data/training/val.jsonl"
  dataset_field:
    prompt: "instruction"
    response: "output"
