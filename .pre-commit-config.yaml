# 预提交钩子配置
# 安装: pip install pre-commit
# 初始化: pre-commit install
# 手动运行: pre-commit run --all-files

repos:
  # ===== Python代码规范 =====
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff版本
    rev: v0.6.9
    hooks:
      # 运行Ruff linter
      - id: ruff
        name: Ruff Linter
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/.*\.py$
        exclude: ^backend/(alembic|\.venv|venv)/
      
      # 运行Ruff formatter
      - id: ruff-format
        name: Ruff Formatter
        files: ^backend/.*\.py$
        exclude: ^backend/(alembic|\.venv|venv)/

  # ===== Python类型检查 =====
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        name: MyPy Type Check
        files: ^backend/.*\.py$
        exclude: ^backend/(alembic|\.venv|venv|tests)/
        additional_dependencies:
          - pydantic>=2.0.0
          - pydantic-settings>=2.0.0
          - sqlalchemy>=2.0.0
          - fastapi>=0.100.0
          - types-python-jose
          - types-passlib

  # ===== Python安全检查 =====
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        name: Bandit Security Check
        args: ["-c", "pyproject.toml"]
        files: ^backend/.*\.py$
        exclude: ^backend/(tests|alembic)/

  # ===== 前端代码规范 =====
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.11.1
    hooks:
      - id: eslint
        name: ESLint
        entry: eslint
        language: node
        files: ^frontend/.*\.(js|vue)$
        exclude: ^frontend/(node_modules|dist)/
        args: [--fix, --max-warnings=0]
        additional_dependencies:
          - eslint@^8.56.0
          - eslint-plugin-vue@^9.21.1
          - eslint-plugin-import@^2.29.1
          - eslint-plugin-unused-imports@^3.1.0
          - eslint-config-prettier@^9.1.0
          - eslint-import-resolver-alias@^1.1.2

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: Prettier
        files: ^frontend/.*\.(js|vue|json|css|md)$
        exclude: ^frontend/(node_modules|dist)/
        additional_dependencies:
          - prettier@^3.2.5

  # ===== 通用检查 =====
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # 检查合并冲突标记
      - id: check-merge-conflict
        name: Check Merge Conflicts
      
      # 检查YAML语法
      - id: check-yaml
        name: Check YAML Syntax
      
      # 检查JSON语法
      - id: check-json
        name: Check JSON Syntax
        exclude: ^frontend/package-lock\.json$
      
      # 检查TOML语法
      - id: check-toml
        name: Check TOML Syntax
      
      # 修复行尾空格
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        args: [--markdown-linebreak-ext=md]
      
      # 修复文件末尾空行
      - id: end-of-file-fixer
        name: Fix End of Files
      
      # 检查文件大小（最大500KB）
      - id: check-added-large-files
        name: Check Large Files
        args: ['--maxkb=500']
      
      # 检查私有密钥
      - id: detect-private-key
        name: Detect Private Keys
      
      # 检查可执行文件是否有shebang
      - id: check-executables-have-shebangs
        name: Check Executables
      
      # 禁止提交到main分支
      - id: no-commit-to-branch
        name: Protect Main Branch
        args: ['--branch', 'main', '--branch', 'master']

  # ===== 提交信息规范 =====
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.29.0
    hooks:
      - id: commitizen
        name: Commitizen Check
        stages: [commit-msg]

# ===== 本地钩子 =====
ci:
  autofix_commit_msg: |
    [pre-commit.ci] 自动修复代码格式
    
    由pre-commit.ci自动生成的修复
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] 更新pre-commit钩子'
  autoupdate_schedule: weekly
  submodules: false
